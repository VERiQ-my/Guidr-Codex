<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0d7377" />
  <title>Guidr — You're offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #edf1f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }
    .badge {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #e6f2f2;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    h1 { font-size: 20px; color: #1f2933; margin-bottom: 10px; }
    p { font-size: 14px; color: #7b8794; line-height: 1.6; margin-bottom: 24px; }
    button {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #0d7377;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .tip {
      margin-top: 18px;
      font-size: 12px;
      color: #7b8794;
    }
    .tip strong { color: #1f2933; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#0d7377" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5l-8-3z" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Guidr needs an internet connection to scan messages and reach your guardians. Reconnect and try again.</p>
    <button onclick="location.reload()">Try again</button>
    <p class="tip">Offline safety tip: <strong>never rush</strong>. A real bank or agency will never pressure you to act in minutes. If in doubt, call NSRC at <strong>997</strong>.</p>
  </div>
</body>
</html>
